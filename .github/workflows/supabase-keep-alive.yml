name: Supabase Keep-Alive

# Ejecuta un ping cada 3 días para evitar que el proyecto
# de Supabase (plan gratuito) se pause por inactividad.
# El plan gratuito pausa después de 7 días sin requests.

on:
  schedule:
    # Cada 3 días a las 9:00 AM UTC (4:00 AM Ecuador)
    - cron: '0 9 */3 * *'
  workflow_dispatch: # Permite ejecución manual desde GitHub Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase at $(date)"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://mumwgxotgddqtgldltqg.supabase.co/rest/v1/school_settings?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11bXdneG90Z2RkcXRnbGRsdHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NzgwMTksImV4cCI6MjA4NTU1NDAxOX0.8RQ-XHTcKwCoItTgrBL72a0FGLok7ZVDHUIMUcvhXeY" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11bXdneG90Z2RkcXRnbGRsdHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NzgwMTksImV4cCI6MjA4NTU1NDAxOX0.8RQ-XHTcKwCoItTgrBL72a0FGLok7ZVDHUIMUcvhXeY")

          echo "HTTP Status: $RESPONSE"

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "206" ]; then
            echo "✅ Supabase alive — proyecto activo"
          else
            echo "⚠️  Respuesta inesperada: $RESPONSE"
            exit 1
          fi
